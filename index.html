/* ── CountUp Component for animated numbers ── */
function CountUp({ to }) {
  const [num, setNum] = useState(0);
  useEffect(() => {
    if (!to) return;
    let start = null;
    const animate = (timestamp) => {
      if (!start) start = timestamp;
      const progress = Math.min((timestamp - start) / 800, 1);
      setNum(Math.floor(to * progress));
      if (progress < 1) requestAnimationFrame(animate);
      else setNum(to);
    };
    requestAnimationFrame(animate);
  }, [to]);
  return <span>{num}</span>;
}

function App() {
  // Auth state

  // Save state
  const [saving, setSaving] = useState(false); // false, "saving", "saved"
  const saveTimeoutRef = useRef(null);
  const dataLoadedRef = useRef(false); // prevent auto-save before data is loaded from DB

  // App state (start with INITIAL_RACES, overwrite after auth)
  const [races, setRaces] = useState(INITIAL_RACES);
  const [selRace, setSelRace] = useState(0);
  const [tab, setTab] = useState("analysis");
  const [showAdd, setShowAdd] = useState(false);
  const [newRace, setNewRace] = useState({ name: "", year: 2026, grade: "GI", date: "", course: "" });
  const [detailHorse, setDetailHorse] = useState(null);
  const [showNotes, setShowNotes] = useState(true);
  const [editingHorse, setEditingHorse] = useState(null);
  const [editingAi, setEditingAi] = useState(null);

  /* ── Check auth on mount ── */
  useEffect(() => {
    if (!sb) {
      setLoading(false);
      setAuthError("Supabaseクライアントが初期化されていません");
      return;
    }

    let initialCheckDone = false;

    // Listen for auth changes — DO NOT await async work here (causes auth lock deadlock)
    const { data: { subscription } } = sb.auth.onAuthStateChange((event, session) => {
      console.log("Auth event:", event, session?.user?.email);
      if (session?.user) {
        setUser(session.user);
      } else {
        setUser(null);
        setRaces(INITIAL_RACES);
        dataLoadedRef.current = false;
      }
      if (!initialCheckDone) {
        initialCheckDone = true;
        setLoading(false);
      }
    });

    // Fallback: if onAuthStateChange doesn't fire within 3s, stop loading
    const timeout = setTimeout(() => {
      if (!initialCheckDone) {
        initialCheckDone = true;
        setLoading(false);
      }
    }, 3000);

    return () => {
      subscription?.unsubscribe();
      clearTimeout(timeout);
    };
  }, []);

  /* ── Load data when user changes (separate from auth callback to avoid lock) ── */
  useEffect(() => {
    if (user && !dataLoadedRef.current) {
      console.log("[useEffect user] user set, loading data...");
      loadUserData(user.id);
    }
  }, [user, loadUserData]);

  /* ── Load user data from Supabase ── */
  const loadUserData = useCallback(async (userId) => {
    console.log("[loadUserData] called with userId:", userId);
    try {
      console.log("[loadUserData] querying user_data table...");
      const { data, error } = await sb
        .from("user_data")
        .select("races")
        .eq("user_id", userId)
        .single();

      console.log("[loadUserData] query result:", { data: data ? "exists" : "null", error: error?.code || "none" });

      if (error && error.code !== "PGRST116") {
        throw error;
      }

      if (data?.races && Array.isArray(data.races) && data.races.length > 0) {
        console.log("[loadUserData] loaded", data.races.length, "races from DB");
        dataLoadedRef.current = true;
        setRaces(data.races);
      } else {
        console.log("[loadUserData] no data found, saving INITIAL_RACES");
        await saveToSupabase(userId, INITIAL_RACES);
        dataLoadedRef.current = true;
        setRaces(INITIAL_RACES);
      }
      console.log("[loadUserData] dataLoadedRef is now TRUE");
    } catch (err) {
      console.error("[loadUserData] ERROR:", err);
      // Still set dataLoadedRef so user changes can save
      dataLoadedRef.current = true;
    }
  }, []);

  /* ── Save to Supabase (debounced) ── */
  const saveToSupabase = useCallback(async (userId, racesData) => {
    if (!sb) { console.warn("sb is null, cannot save"); return; }

    try {
      console.log("Saving to Supabase...", { userId, racesCount: racesData?.length });
      const { error } = await sb
        .from("user_data")
        .upsert(
          {
            user_id: userId,
            races: racesData,
            updated_at: new Date().toISOString(),
          },
          { onConflict: "user_id" }
        );

      if (error) throw error;
      console.log("Save success!");
    } catch (err) {
      console.error("Save to Supabase error:", err);
    }
  }, []);

  /* ── Auto-save with debounce ── */
  useEffect(() => {
    console.log("[auto-save] effect triggered. user:", !!user, "dataLoaded:", dataLoadedRef.current);
    if (!user || !dataLoadedRef.current) return;

    setSaving("saving");

    if (saveTimeoutRef.current) {
      clearTimeout(saveTimeoutRef.current);
    }

    saveTimeoutRef.current = setTimeout(async () => {
      await saveToSupabase(user.id, races);
      setSaving("saved");

      setTimeout(() => setSaving(false), 2000);
    }, 1500);

    return () => {
      if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
    };
  }, [races, user, saveToSupabase]);

  /* ── Move hooks BEFORE early returns ── */
  /* These hooks must run on every render, before conditional returns */

  const race = races[selRace] || races[0];
  const upd = (patch) => setRaces((p) => p.map((r, i) => (i === selRace ? { ...r, ...patch } : r)));

  /* ── Calcs ── */
  const ar = useMemo(() => {
    if (!race) return null;
    const p = race.myPicks || {}, res = race.result || {};
    const t3 = [res.r1, res.r2, res.r3].filter(Boolean);
    if (!t3.length) return null;
    const hon = Object.entries(p).find(([, v]) => v === "◎")?.[0];
    const picked = Object.entries(p).filter(([, v]) => ["◎", "○", "▲", "△"].includes(v)).map(([k]) => k);
    const keshi = Object.entries(p).filter(([, v]) => v === "×").map(([k]) => k);
    return {
      t3, hon, picked, keshi,
      honWin: hon && t3[0] === hon, honHit: hon && t3.includes(hon),
      t3Hit: t3.filter((h) => picked.includes(h)).length,

      const mE = h.myTop3Pct != null ? Math.abs(h.myTop3Pct / 100 - act) : null;
      let cl = "tie";
      if (aE != null && mE != null) { if (aE < mE) { cl = "ai"; aiW++; } else if (mE < aE) { cl = "my"; myW++; } }
      rows.push({ name: h.name, inT3, pos, aiPct: h.aiTop3Pct, myPct: h.myTop3Pct, cl });
    });
    return { rows, aiW, myW };
  }, [ar, race]);

  const hist = useMemo(() => {
    let tot = 0, hW = 0, hT = 0, cov = 0, covT = 0, kM = 0, kT = 0, aW = 0, mW = 0;

      tot++;
      const pk = r.myPicks || {};
      const hon = Object.entries(pk).find(([, v]) => v === "◎")?.[0];
      if (hon && t3[0] === hon) hW++;
      if (hon && t3.includes(hon)) hT++;
      const all = Object.entries(pk).filter(([, v]) => ["◎", "○", "▲", "△"].includes(v)).map(([k]) => k);
      cov += t3.filter((h) => all.includes(h)).length; covT += t3.length;

      r.horses.forEach((h) => {
        const a = t3.includes(h.name) ? 1 : 0;

          const ae = Math.abs(h.aiTop3Pct / 100 - a), me = Math.abs(h.myTop3Pct / 100 - a);
          if (ae < me) aW++; else if (me < ae) mW++;
        }

    });
    return { tot, hW, hT, cov, covT, kM, kT, aW, mW, total: races.length };

    document.head.appendChild(style);

  }, []);

  /* ── Auth handlers ── */
  const handleSignUp = async () => {
    setAuthError("");
    setAuthConfirmMsg("");

      const { data, error } = await sb.auth.signUp({
        email: authEmail,
        password: authPassword,

      if (error) throw error;

      if (data?.user && !data.session) {
        setAuthConfirmMsg("確認メールを送信しました。メールを確認してログインしてください。");
        setAuthEmail("");
        setAuthPassword("");
      } else if (data?.session) {
        // setUser triggers useEffect which calls loadUserData
        setUser(data.user);
      }
    } catch (err) {
      setAuthError(err.message || "サインアップに失敗しました");
    }
  };

  const handleLogin = async () => {
    setAuthError("");
    try {
      const { data, error } = await sb.auth.signInWithPassword({
        email: authEmail,
        password: authPassword,
      });

      if (error) throw error;

      if (data?.user) {

        setUser(data.user);
      }

      setAuthError(err.message || "ログインに失敗しました");
    }
  };

  const handleLogout = async () => {

    try {
      dataLoadedRef.current = false;
      await sb.auth.signOut();
      setUser(null);
      setRaces(INITIAL_RACES);
      setAuthEmail("");
      setAuthPassword("");
      setAuthError("");
      setAuthConfirmMsg("");
      console.log("[handleLogout] success");

          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {[{ k: "name", ph: "レース名", w: 120 }, { k: "year", ph: "年", w: 60 }, { k: "grade", ph: "GI", w: 50 }, { k: "date", ph: "2026-04-05", w: 110 }, { k: "course", ph: "阪神11R 芝2000m", w: 180 }].map(({ k, ph, w }) => (
              <input key={k} placeholder={ph} value={newRace[k]} onChange={(e) => setNewRace({ ...newRace, [k]: e.target.value })}

            {t.label}

                  <div style={{ fontWeight: 800, fontSize: 12, color: "#1d4ed8", marginBottom: 6, borderBottom: "1px solid #e5e7eb", paddingBottom: 4 }}>{n.title}</div>

            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>

              <span style={{ fontSize: 18, fontWeight: 900, color: "#111827" }}>{detH.name}</span>
              {detH.odds && <span style={{ fontSize: 13, color: "#6b7280" }}>{detH.odds}倍</span>}
            </div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>

              {detH.jockey && detH.jockey !== "-" && <Badge bg="#f3f4f6" color="#374151">{detH.jockey}</Badge>}
              {detH.age && detH.age !== "-" && <Badge bg="#f3f4f6" color="#374151">{detH.age}</Badge>}
              {detH.weight && <Badge bg="#f3f4f6" color="#374151">{detH.weight}</Badge>}

              {detH.style && detH.style !== "-" && <Badge bg="#fff" color={SC[detH.style] || "#9ca3af"} border={SC[detH.style] || "#d1d5db"}>{detH.style}</Badge>}
            </div>
            <PctBar ai={detH.aiTop3Pct} my={detH.myTop3Pct} />
          </Card>

          {/* 血統ツリー (Pedigree) */}
          <Card style={{ marginBottom: 10, padding: 10 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span style={{ fontSize: 11, fontWeight: 800, color: "#374151" }}>血統</span>
              <button onClick={() => setEditingPedigree(editingPedigree === detH.name ? null : detH.name)}
                style={{ fontSize: 11, color: "#374151", background: "none", border: "1px solid #e5e7eb", borderRadius: 4, padding: "2px 8px", cursor: "pointer", fontWeight: 700 }}>
                {editingPedigree === detH.name ? "閉じる" : (detH.sire && detH.sire !== "-") ? "編集" : "＋ 追加"}
              </button>
            </div>
            {editingPedigree === detH.name && (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 4, marginBottom: 8 }}>
                {[{ k: "sire", l: "父" }, { k: "dam", l: "母" }, { k: "sireSire", l: "父父" }, { k: "sireDam", l: "父母" }, { k: "damSire", l: "母父" }, { k: "damDam", l: "母母" }].map(({ k, l }) => (
                  <input key={k} placeholder={l} value={detH[k] === "-" ? "" : (detH[k] || "")} onChange={(e) => updH(detH.name, k, e.target.value || "-")}
                    style={{ padding: "4px 6px", borderRadius: 4, border: "1px solid #d1d5db", fontSize: 11, width: "100%", boxSizing: "border-box" }} />
                ))}
              </div>
            )}
            {(detH.sire && detH.sire !== "-") && (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gridTemplateRows: "repeat(4, auto)", gap: "0", fontSize: 11, lineHeight: 1.3 }}>
              {/* 父系 (rows 1-2) */}
                <div style={{ gridRow: "1 / 3", gridColumn: 1, display: "flex", alignItems: "center", borderRight: "2px solid #e5e7eb", paddingRight: 8 }}>
                  <div style={{ background: "#ede9fe", color: "#6d28d9", padding: "6px 8px", borderRadius: 6, fontWeight: 700, width: "100%", textAlign: "center" }}>
                    <div style={{ fontSize: 9, color: "#8b5cf6", marginBottom: 2 }}>父</div>
                    {detH.sire}
                  </div>
                </div>
                <div style={{ gridRow: 1, gridColumn: 2, display: "flex", alignItems: "center", borderRight: "2px solid #f3f4f6", paddingLeft: 8, paddingRight: 6, paddingTop: 4, paddingBottom: 2 }}>
                  <div style={{ background: "#f5f3ff", color: "#7c3aed", padding: "4px 6px", borderRadius: 4, width: "100%", textAlign: "center" }}>
                    <div style={{ fontSize: 8, color: "#a78bfa" }}>父父</div>
                    {detH.sireSire && detH.sireSire !== "-" ? detH.sireSire : "—"}

                </div>
                <div style={{ gridRow: 2, gridColumn: 2, display: "flex", alignItems: "center", borderRight: "2px solid #f3f4f6", paddingLeft: 8, paddingRight: 6, paddingTop: 2, paddingBottom: 4 }}>

                    <div style={{ fontSize: 8, color: "#f472b6" }}>父母</div>

                {/* 母系 (rows 3-4) */}
                <div style={{ gridRow: "3 / 5", gridColumn: 1, display: "flex", alignItems: "center", borderRight: "2px solid #e5e7eb", paddingRight: 8, borderTop: "1px solid #f3f4f6", paddingTop: 4 }}>
                  <div style={{ background: "#fce7f3", color: "#be185d", padding: "6px 8px", borderRadius: 6, fontWeight: 700, width: "100%", textAlign: "center" }}>
                    <div style={{ fontSize: 9, color: "#ec4899", marginBottom: 2 }}>母</div>
                    {detH.dam && detH.dam !== "-" ? detH.dam : "—"}
                  </div>
                </div>
                <div style={{ gridRow: 3, gridColumn: 2, display: "flex", alignItems: "center", borderRight: "2px solid #f3f4f6", paddingLeft: 8, paddingRight: 6, paddingTop: 4, paddingBottom: 2, borderTop: "1px solid #f3f4f6" }}>
                  <div style={{ background: "#f5f3ff", color: "#7c3aed", padding: "4px 6px", borderRadius: 4, width: "100%", textAlign: "center" }}>
                    <div style={{ fontSize: 8, color: "#a78bfa" }}>母父</div>
                    {detH.damSire && detH.damSire !== "-" ? detH.damSire : "—"}
                  </div>
                </div>
                <div style={{ gridRow: 4, gridColumn: 2, display: "flex", alignItems: "center", borderRight: "2px solid #f3f4f6", paddingLeft: 8, paddingRight: 6, paddingTop: 2, paddingBottom: 4 }}>

                    <div style={{ fontSize: 8, color: "#f472b6" }}>母母</div>
                    {detH.damDam && detH.damDam !== "-" ? detH.damDam : "—"}

                </div>
            </div>

                <input placeholder="プラス材料" value={detH.aiPros || ""} onChange={(e) => updH(detH.name, "aiPros", e.target.value)}

                <input placeholder="マイナス材料" value={detH.aiCons || ""} onChange={(e) => updH(detH.name, "aiCons", e.target.value)}

                <textarea placeholder="AI分析を貼り付け..." value={detH.aiAnalysis || ""} onChange={(e) => updH(detH.name, "aiAnalysis", e.target.value)}

                    <div style={{ fontSize: 10, fontWeight: 800, color: "#dc2626", marginBottom: 2 }}>マイナス材料</div>
                    <div style={{ fontSize: 12, color: "#991b1b", lineHeight: 1.8 }}>{detH.aiCons}</div>
                  </div>
                )}
                <div style={{ fontSize: 12, color: "#374151", lineHeight: 1.9, whiteSpace: "pre-wrap" }}>{detH.aiAnalysis}</div>
              </div>
            ) : (
              <div style={{ fontSize: 12, color: "#9ca3af" }}>「＋ 追加」をタップしてAI分析を貼り付け</div>
            )}
          </Card>

          {/* My Analysis */}
          <Card style={{ marginBottom: 8, background: "#ecfeff", border: "1px solid #a5f3fc" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
              <span style={{ fontSize: 11, fontWeight: 800, color: "#0891b2" }}>自分の分析</span>

                {editingHorse === detH.name ? "閉じる" : "編集"}
              </button>
            </div>

            {editingHorse === detH.name ? (
              <div>
                <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 6 }}>
                  <span style={{ fontSize: 11, fontWeight: 700, color: "#0891b2" }}>3着以内%</span>
                  <input type="number" min="0" max="100" value={detH.myTop3Pct ?? ""} onChange={(e) => updH(detH.name, "myTop3Pct", e.target.value ? +e.target.value : null)}
                    style={{ width: 60, padding: "4px 6px", borderRadius: 4, border: "1px solid #d1d5db", fontSize: 12 }} />
                </div>
                <input placeholder="プラス材料" value={detH.myPros || ""} onChange={(e) => updH(detH.name, "myPros", e.target.value)}
                  style={{ width: "100%", padding: "5px 8px", borderRadius: 6, border: "1px solid #d1d5db", fontSize: 12, marginBottom: 4, boxSizing: "border-box" }} />
                <input placeholder="マイナス材料" value={detH.myCons || ""} onChange={(e) => updH(detH.name, "myCons", e.target.value)}
                  style={{ width: "100%", padding: "5px 8px", borderRadius: 6, border: "1px solid #d1d5db", fontSize: 12, marginBottom: 4, boxSizing: "border-box" }} />
                <textarea placeholder="自分の分析を自由に記入..." value={detH.myAnalysis || ""} onChange={(e) => updH(detH.name, "myAnalysis", e.target.value)}
                  style={{ width: "100%", minHeight: 80, padding: 8, borderRadius: 6, border: "1px solid #d1d5db", fontSize: 12, lineHeight: 1.7, resize: "vertical", boxSizing: "border-box" }} />
              </div>
            ) : (
              detH.myAnalysis || detH.myPros || detH.myCons ? (
                <div>
                  {detH.myPros && <div style={{ fontSize: 12, color: "#166534", marginBottom: 2 }}>+ {detH.myPros}</div>}
                  {detH.myCons && <div style={{ fontSize: 12, color: "#991b1b", marginBottom: 2 }}>- {detH.myCons}</div>}
                  {detH.myAnalysis && <div style={{ fontSize: 12, color: "#374151", lineHeight: 1.8, whiteSpace: "pre-wrap", marginTop: 4 }}>{detH.myAnalysis}</div>}
                </div>
              ) : (
                <div style={{ fontSize: 12, color: "#9ca3af" }}>「編集」をタップして自分の分析を入力</div>
              )
            )}
          </Card>

          {/* 前後の馬へ移動 */}
          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
            {(() => {
              const idx = race.horses.findIndex((h) => h.name === detH.name);
              return (
                <>
                  {idx > 0 && <Btn onClick={() => { setDetailHorse(race.horses[idx - 1].name); setEditingHorse(null); setEditingAi(null); }} style={{ flex: 1, fontSize: 11 }}>← {race.horses[idx - 1].name}</Btn>}
                  {idx < race.horses.length - 1 && <Btn onClick={() => { setDetailHorse(race.horses[idx + 1].name); setEditingHorse(null); setEditingAi(null); }} style={{ flex: 1, fontSize: 11 }}>{race.horses[idx + 1].name} →</Btn>}
                </>
              );
            })()}
          </div>
        </div>
      )}

      {/* ═════════════════════════════════════════════════ */}
      {/* TAB 2: 結果・振り返り                             */}
      {/* ═════════════════════════════════════════════════ */}
      {tab === "results" && (
        <div className="keiba-tab-active">
          <Sec>着順を入力</Sec>
          <Card style={{ marginBottom: 10 }}>
            {["r1", "r2", "r3"].map((key, i) => (
              <div key={key} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: i < 2 ? 10 : 0 }}>
                <div style={{ width: 36, height: 36, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", background: ["#fbbf24", "#9ca3af", "#b45309"][i], color: "#fff", fontSize: 16, fontWeight: 900 }}>{i + 1}着</div>
                <select value={race.result?.[key] || ""} onChange={(e) => upd({ result: { ...race.result, [key]: e.target.value } })}

                  <option value="">選択してください</option>
                  {race.horses.map((h) => <option key={h.name} value={h.name}>{h.num > 0 ? `${h.num} ` : ""}{h.name}</option>)}
                </select>
              </div>
            ))}
          </Card>

          {/* Result analysis */}
          {ar && (
            <>
              <Sec>予想スコア</Sec>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 12 }}>
                {[
                  { l: "本命", v: ar.honWin ? "1着的中" : ar.honHit ? "3着内" : "ハズレ", c: ar.honWin ? "#16a34a" : ar.honHit ? "#d97706" : "#dc2626", b: ar.honWin ? "#dcfce7" : ar.honHit ? "#fef9c3" : "#fee2e2" },
                  { l: "3着カバー", v: `${ar.t3Hit}/3`, c: ar.t3Hit >= 2 ? "#16a34a" : "#d97706", b: ar.t3Hit >= 2 ? "#dcfce7" : "#fef9c3" },
                  { l: "消し精度", v: ar.kMiss > 0 ? `${ar.kMiss}失敗` : "全正解", c: ar.kMiss === 0 ? "#16a34a" : "#dc2626", b: ar.kMiss === 0 ? "#dcfce7" : "#fee2e2" },
                ].map((s, idx) => (
                  <Card key={s.l} style={{ flex: "1 1 85px", textAlign: "center", background: s.b, border: "none", animationDelay: `${idx * 0.1}s` }} className="keiba-score-card">
                    <div style={{ fontSize: 10, fontWeight: 700, color: "#6b7280" }}>{s.l}</div>
                    <div style={{ fontSize: 18, fontWeight: 900, color: s.c, marginTop: 2 }}>{s.v}</div>
                  </Card>
                ))}
              </div>

              {/* 予想 vs 結果 */}
              <Sec>予想 vs 結果</Sec>
              <div style={{ display: "flex", flexDirection: "column", gap: 4, marginBottom: 12 }}>
                {race.horses.map((h) => {
                  const mk = race.myPicks?.[h.name] || "―";
                  const pos = ar.t3.indexOf(h.name);
                  const in3 = pos >= 0;
                  const hit = in3 && mk !== "×" && mk !== "―";
                  const miss = in3 && mk === "×";
                  return (
                    <div key={h.name} style={{
                      display: "flex", alignItems: "center", gap: 6, padding: "6px 8px", borderRadius: 7,
                      background: miss ? "#fef2f2" : hit ? "#f0fdf4" : in3 ? "#fffbeb" : "#fff",
                      border: `1px solid ${miss ? "#fca5a5" : hit ? "#86efac" : in3 ? "#fde68a" : "#f3f4f6"}`,
                    }}>
                      <MarkBadge m={mk} />
                      <span style={{ flex: 1, fontSize: 12, fontWeight: in3 ? 800 : 400, color: in3 ? "#111827" : "#9ca3af" }}>{h.name}</span>
                      {pos >= 0 && <Badge bg={["#fbbf24", "#d1d5db", "#d97706"][pos]} color="#fff" style={{ fontSize: 10 }}>{pos + 1}着</Badge>}
                      {hit && <span style={{ fontSize: 10, fontWeight: 800, color: "#16a34a" }}>的中</span>}
                      {miss && <span style={{ fontSize: 10, fontWeight: 800, color: "#dc2626" }}>消し失敗</span>}
                    </div>

                  <Sec>AI分析 vs 自分の分析 ─ どっちが正確だった？</Sec>
                  <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
                    <Card style={{ flex: 1, textAlign: "center", background: comp.aiW > comp.myW ? "#faf5ff" : "#fff", border: comp.aiW > comp.myW ? "2px solid #8b5cf6" : "1px solid #e5e7eb" }}>
                      <div style={{ fontSize: 10, fontWeight: 700, color: "#7c3aed" }}>AI</div>
                      <div style={{ fontSize: 24, fontWeight: 900, color: "#7c3aed" }}><CountUp to={comp.aiW} /></div>
                    </Card>
                    <Card style={{ flex: 1, textAlign: "center", background: comp.myW > comp.aiW ? "#ecfeff" : "#fff", border: comp.myW > comp.aiW ? "2px solid #06b6d4" : "1px solid #e5e7eb" }}>
                      <div style={{ fontSize: 10, fontWeight: 700, color: "#0891b2" }}>自分</div>
                      <div style={{ fontSize: 24, fontWeight: 900, color: "#0891b2" }}><CountUp to={comp.myW} /></div>

                    {comp.rows.map((r) => (
                      <div key={r.name} style={{ display: "flex", alignItems: "center", gap: 6, padding: "5px 8px", borderRadius: 6, background: r.inT3 ? "#fffbeb" : "#fff", border: `1px solid ${r.inT3 ? "#fde68a" : "#f3f4f6"}` }}>
                        <span style={{ flex: 1, fontSize: 11, fontWeight: r.inT3 ? 800 : 400, color: r.inT3 ? "#111827" : "#9ca3af" }}>{r.name}</span>
                        {r.inT3 && <Badge bg="#fbbf24" color="#fff" style={{ fontSize: 9 }}>{r.pos + 1}着</Badge>}
                        <span style={{ fontSize: 10, color: "#7c3aed", fontWeight: 600, minWidth: 28, textAlign: "right" }}>{r.aiPct != null ? `${r.aiPct}%` : "-"}</span>
                        <span style={{ fontSize: 10, color: "#9ca3af" }}>vs</span>

                      </div>

                  </div>
                </>
              )}
            </>
          )}

          <Card style={{ marginBottom: 6, padding: 10 }}>
            <div style={{ fontSize: 11, fontWeight: 800, color: "#16a34a", marginBottom: 4 }}>当たった点</div>
            <textarea value={race.reviewHit || ""} onChange={(e) => upd({ reviewHit: e.target.value })}
              placeholder="正しかった分析..." style={{ width: "100%", minHeight: 40, padding: 6, borderRadius: 6, border: "1px solid #d1d5db", fontSize: 12, lineHeight: 1.7, resize: "vertical", boxSizing: "border-box" }} />
          </Card>
          <Card style={{ marginBottom: 6, padding: 10 }}>
            <div style={{ fontSize: 11, fontWeight: 800, color: "#dc2626", marginBottom: 4 }}>外した点・反省</div>
            <textarea value={race.reviewMiss || ""} onChange={(e) => upd({ reviewMiss: e.target.value })}
              placeholder="見落とし、判断ミス..." style={{ width: "100%", minHeight: 40, padding: 6, borderRadius: 6, border: "1px solid #d1d5db", fontSize: 12, lineHeight: 1.7, resize: "vertical", boxSizing: "border-box" }} />
          </Card>
          <Card style={{ marginBottom: 6, padding: 10 }}>
            <div style={{ fontSize: 11, fontWeight: 800, color: "#2563eb", marginBottom: 4 }}>次回への教訓</div>
            <textarea value={race.reviewLesson || ""} onChange={(e) => upd({ reviewLesson: e.target.value })}
              placeholder="次の予想に活かしたいこと..." style={{ width: "100%", minHeight: 40, padding: 6, borderRadius: 6, border: "1px solid #d1d5db", fontSize: 12, lineHeight: 1.7, resize: "vertical", boxSizing: "border-box" }} />
          </Card>
          <textarea value={race.resultMemo} onChange={(e) => upd({ resultMemo: e.target.value })}
            placeholder="その他メモ（展開の振り返りなど）..." style={{ width: "100%", minHeight: 50, padding: 10, borderRadius: 8, border: "1px solid #d1d5db", fontSize: 12, lineHeight: 1.7, resize: "vertical", boxSizing: "border-box" }} />
        </div>
      )}

      {/* ═════════════════════════════════════════════════ */}
      {/* TAB 3: 履歴                                       */}
      {/* ═════════════════════════════════════════════════ */}
      {tab === "history" && (
        <div className="keiba-tab-active">
          <Sec>累計成績</Sec>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 14 }}>
            {[
              { l: "予想レース", v: hist.tot, s: `/${hist.total}` },
              { l: "本命1着率", v: hist.tot ? `${Math.round(hist.hW / hist.tot * 100)}%` : "-", s: `${hist.hW}/${hist.tot}` },
              { l: "本命3着内", v: hist.tot ? `${Math.round(hist.hT / hist.tot * 100)}%` : "-", s: `${hist.hT}/${hist.tot}` },
              { l: "3着カバー", v: hist.covT ? `${Math.round(hist.cov / hist.covT * 100)}%` : "-", s: `${hist.cov}/${hist.covT}` },
              { l: "消し失敗", v: hist.kM, s: `/${hist.kT}頭中` },
            ].map((s) => (
              <Card key={s.l} style={{ flex: "1 1 85px", textAlign: "center" }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: "#9ca3af" }}>{s.l}</div>
                <div style={{ fontSize: 22, fontWeight: 900, color: "#111827", marginTop: 2 }}>{s.v}</div>
                <div style={{ fontSize: 10, color: "#9ca3af" }}>{s.s}</div>
              </Card>
            ))}
          </div>

          {(hist.aW > 0 || hist.mW > 0) && (
            <>
              <Sec>AI vs 自分 通算精度</Sec>
              <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
                <Card style={{ flex: 1, textAlign: "center", background: hist.aW > hist.mW ? "#faf5ff" : "#fff" }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#7c3aed" }}>AI</div>
                  <div style={{ fontSize: 22, fontWeight: 900, color: "#7c3aed" }}><CountUp to={hist.aW} /></div>
                </Card>
                <Card style={{ flex: 1, textAlign: "center", background: hist.mW > hist.aW ? "#ecfeff" : "#fff" }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#0891b2" }}>自分</div>
                  <div style={{ fontSize: 22, fontWeight: 900, color: "#0891b2" }}><CountUp to={hist.mW} /></div>
                </Card>
              </div>
            </>
          )}

          <Sec>レース一覧</Sec>
          {races.map((r, i) => {
            const done = !!r.result?.r1;
            const pk = r.myPicks || {};
            const hon = Object.entries(pk).find(([, v]) => v === "◎")?.[0];
            const t3 = [r.result?.r1, r.result?.r2, r.result?.r3].filter(Boolean);
            return (
              <Card key={r.id} onClick={() => { setSelRace(i); setTab("analysis"); setDetailHorse(null); }} style={{ cursor: "pointer", padding: "10px 14px", marginBottom: 6 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <Badge bg={done ? "#dcfce7" : "#fef9c3"} color={done ? "#166534" : "#854d0e"}>{done ? "結果済" : "未確定"}</Badge>
                  <span style={{ fontSize: 13, fontWeight: 800 }}>{r.name} {r.year}</span>
                  <Badge bg="#f3f4f6" color="#6b7280">{r.grade}</Badge>
                  <span style={{ fontSize: 11, color: "#9ca3af", marginLeft: "auto" }}>{r.date}</span>
                </div>
                {done && (
                  <div style={{ display: "flex", gap: 12, marginTop: 6, fontSize: 11 }}>
                    <span style={{ color: "#6b7280" }}>1着 <b style={{ color: "#111827" }}>{r.result.r1}</b></span>
                    <span style={{ color: "#6b7280" }}>本命 <b style={{ color: hon && t3.includes(hon) ? "#16a34a" : "#dc2626" }}>{hon || "未設定"} {hon && t3.includes(hon) ? "的中" : "ハズレ"}</b></span>
                  </div>
                )}
              </Card>
            );
          })}
        </div>
      )}

      <div style={{ textAlign: "center", marginTop: 20, padding: 10, fontSize: 10, color: "#d1d5db" }} className="keiba-footer">
        競馬予想ノート v3.0 ─ 馬券は自己責任で
      </div>
    </div>
  );
}


class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, errorInfo) {
    console.error("React Error Boundary caught:", error, errorInfo);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement("div", {style: {padding: 40, color: "red", fontFamily: "monospace"}},
        React.createElement("h2", null, "エラーが発生しました"),
        React.createElement("pre", null, this.state.error?.toString()),
        React.createElement("pre", null, this.state.error?.stack)
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary, null, React.createElement(App))
);
  </script>
</body>
</html>
